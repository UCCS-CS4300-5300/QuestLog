name: Django CI for test, behave, and check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  django:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies and project requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests with coverage report
        run: |
          coverage erase
          coverage run --source=QuestLog,config manage.py test
          coverage run --append --source=QuestLog,config manage.py behave --simple
          coverage report -m --skip-empty

      - name: Run Django checks
        run: python manage.py check
