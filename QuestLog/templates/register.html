{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% block title %} Register | Quest Log {% endblock %}

{% block content %}

    <!-- center the reg-->
    <div class="row justify-content-center" >

        <div class="col-md-6  col-lg-5">

            <div class="card">

                <div class="card-body">

                    <h1 class="h3 mb-4" >Create Account</h1>


                    <form method="post" enctype="multipart/form-data" novalidate>
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <button  type="submit"
                                class="btn btn-success w-100">
                                Create Account
                        </button>

                    </form>


                    <!-- login link -->
                    <p class="mt-3 mb-0" >

                        Already have account?

                        <a href="{% url 'QuestLog:login' %}">
                            Sign in
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

{% endblock %}
